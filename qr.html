<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mess QR Code</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        .card {
            background: white;
            padding: 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }

        img {
            max-width: 100%;
            height: auto;
            border: 4px solid #10b981;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 1.5rem;
        }

        h1 {
            margin: 0 0 1rem 0;
            color: #0f172a;
            font-size: 1.75rem;
            font-weight: 800;
        }

        p {
            color: #64748b;
            margin: 0;
            line-height: 1.5;
        }

        .highlight {
            color: #10b981;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Smart Mess Check-in</h1>
        <!-- This generates a static QR code containing the text 'MESS_TODAY' -->
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=MESS_TODAY&margin=10" alt="QR Code">
        <p>Students: Open the <span class="highlight">Smart Mess App</span> and tap <br><b>"Scan QR for Today's
                Food"</b> <br>to see your count.</p>
    </div>
</body>

</html>
