<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mess - React Portal</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS for Modern UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        /* Custom Styles & Animations */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Loader */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ==========================================
        // MOCK BACKEND & DATABASE (Node/Express/SQL Simulation)
        // ==========================================
        
        const DB_KEYS = {
            USERS: 'smart_mess_users',
            MENU: 'smart_mess_menu',
            ATTENDANCE: 'smart_mess_attendance',
            LOGS: 'smart_mess_logs'
        };

        // Initial Seed Data
        const SEED_DATA = {
            users: [
                { id: 1, name: "Admin User", email: "admin", password: "123", role: "admin" },
                { id: 2, name: "Mess Manager", email: "mess", password: "123", role: "mess" },
                { id: 3, name: "John Student", email: "student", password: "123", role: "student", hostel: "Block A" },
                { id: 4, name: "Jane Doe", email: "jane", password: "123", role: "student", hostel: "Block B" }
            ],
            menu: {
                breakfast: "Idli & Sambar",
                lunch: "Rice, Dal, Mixed Veg, Curd",
                dinner: "Chapati, Paneer Butter Masala, Salad"
            },
            attendance: {} // Format: "YYYY-MM-DD": { userId: { breakfast: true, lunch: false... } }
        };

        // Initialize LocalStorage if empty
        if (!localStorage.getItem(DB_KEYS.USERS)) {
            localStorage.setItem(DB_KEYS.USERS, JSON.stringify(SEED_DATA.users));
            localStorage.setItem(DB_KEYS.MENU, JSON.stringify(SEED_DATA.menu));
            localStorage.setItem(DB_KEYS.ATTENDANCE, JSON.stringify(SEED_DATA.attendance));
        }

        // --- API Service (Simulating Express Routes) ---
        const API = {
            delay: (ms) => new Promise(resolve => setTimeout(resolve, ms)),

            // POST /api/login
            login: async (email, password) => {
                await API.delay(600); // Simulate network latency
                const users = JSON.parse(localStorage.getItem(DB_KEYS.USERS));
                const user = users.find(u => u.email === email && u.password === password);
                if (user) return { success: true, user };
                return { success: false, message: "Invalid credentials" };
            },

            // GET /api/menu
            getMenu: async () => {
                await API.delay(200);
                return JSON.parse(localStorage.getItem(DB_KEYS.MENU));
            },

            // PUT /api/menu (Mess Only)
            updateMenu: async (newMenu) => {
                await API.delay(400);
                localStorage.setItem(DB_KEYS.MENU, JSON.stringify(newMenu));
                return { success: true };
            },

            // GET /api/attendance?date=...
            getAttendance: async (date) => {
                await API.delay(200);
                const all = JSON.parse(localStorage.getItem(DB_KEYS.ATTENDANCE));
                return all[date] || {};
            },

            // POST /api/attendance (Student Opt-in)
            markAttendance: async (date, userId, mealType, status) => {
                await API.delay(300);
                const all = JSON.parse(localStorage.getItem(DB_KEYS.ATTENDANCE));
                if (!all[date]) all[date] = {};
                if (!all[date][userId]) all[date][userId] = {};
                
                all[date][userId][mealType] = status;
                localStorage.setItem(DB_KEYS.ATTENDANCE, JSON.stringify(all));
                return { success: true };
            },

            // GET /api/users (Admin Only)
            getUsers: async () => {
                await API.delay(300);
                return JSON.parse(localStorage.getItem(DB_KEYS.USERS));
            },

            // GET /api/export (Admin Only)
            exportData: async () => {
                await API.delay(500);
                const users = JSON.parse(localStorage.getItem(DB_KEYS.USERS));
                const att = JSON.parse(localStorage.getItem(DB_KEYS.ATTENDANCE));
                return { users, attendance: att };
            }
        };

        // ==========================================
        // REACT COMPONENTS
        // ==========================================

        // --- UI Components ---
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const bgClass = type === 'success' ? 'bg-green-500' : 'bg-red-500';

            return (
                <div className={`fixed top-5 right-5 ${bgClass} text-white px-6 py-3 rounded shadow-lg fade-in z-50`}>
                    {message}
                </div>
            );
        };

        const Button = ({ children, onClick, variant = 'primary', className = '', loading = false, disabled = false }) => {
            const baseClass = "px-4 py-2 rounded font-medium transition-colors flex items-center justify-center gap-2";
            const variants = {
                primary: "bg-blue-600 hover:bg-blue-700 text-white",
                secondary: "bg-gray-200 hover:bg-gray-300 text-gray-800",
                danger: "bg-red-500 hover:bg-red-600 text-white",
                success: "bg-green-600 hover:bg-green-700 text-white"
            };
            
            return (
                <button 
                    onClick={onClick} 
                    disabled={disabled || loading}
                    className={`${baseClass} ${variants[variant]} ${disabled || loading ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}
                >
                    {loading && <div className="loader w-4 h-4 border-2 border-white border-t-transparent"></div>}
                    {children}
                </button>
            );
        };

        const Card = ({ title, children, className = "" }) => (
            <div className={`bg-white rounded-xl shadow-sm p-6 border border-gray-100 ${className}`}>
                {title && <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">{title}</h3>}
                {children}
            </div>
        );

        // --- Views ---

        const Login = ({ onLogin }) => {
            const [email, setEmail] = useState("student");
            const [password, setPassword] = useState("123");
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError("");
                
                const res = await API.login(email, password);
                
                if (res.success) {
                    onLogin(res.user);
                } else {
                    setError(res.message);
                }
                setLoading(false);
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-500 to-purple-600 p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md fade-in">
                        <div className="text-center mb-8">
                            <i className="fas fa-utensils text-5xl text-blue-500 mb-4"></i>
                            <h1 className="text-3xl font-bold text-gray-800">Smart Mess</h1>
                            <p className="text-gray-500">Login to your portal</p>
                        </div>
                        
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Email / Username</label>
                                <input 
                                    type="text" 
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                    placeholder="student, admin, or mess"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                <input 
                                    type="password" 
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                    placeholder="123"
                                />
                            </div>
                            
                            {error && <div className="text-red-500 text-sm text-center bg-red-50 p-2 rounded">{error}</div>}
                            
                            <Button loading={loading} className="w-full py-3 text-lg">
                                Login
                            </Button>
                        </form>

                        <div className="mt-6 text-xs text-gray-400 text-center">
                            <p>Demo Credentials:</p>
                            <p>Student: <b>student / 123</b></p>
                            <p>Mess: <b>mess / 123</b></p>
                            <p>Admin: <b>admin / 123</b></p>
                        </div>
                    </div>
                </div>
            );
        };

        const StudentDashboard = ({ user, onLogout }) => {
            const [menu, setMenu] = useState({});
            const [todayAttendance, setTodayAttendance] = useState({});
            const [loading, setLoading] = useState(true);
            const [toast, setToast] = useState(null);

            const today = new Date().toISOString().split('T')[0];

            useEffect(() => {
                loadData();
            }, []);

            const loadData = async () => {
                const [mData, aData] = await Promise.all([API.getMenu(), API.getAttendance(today)]);
                setMenu(mData);
                setTodayAttendance(aData[user.id] || {});
                setLoading(false);
            };

            const handleMealToggle = async (mealType) => {
                const currentStatus = !!todayAttendance[mealType];
                const newStatus = !currentStatus;
                
                // Optimistic UI update
                setTodayAttendance(prev => ({ ...prev, [mealType]: newStatus }));
                
                const res = await API.markAttendance(today, user.id, mealType, newStatus);
                
                if (res.success) {
                    setToast({ message: `Marked ${mealType} as ${newStatus ? 'Opted In' : 'Opted Out'}`, type: 'success' });
                } else {
                    // Revert on failure
                    setToast({ message: "Failed to update", type: 'error' });
                    setTodayAttendance(prev => ({ ...prev, [mealType]: currentStatus }));
                }
            };

            if (loading) return <div className="flex justify-center items-center h-screen"><div className="loader"></div></div>;

            return (
                <div className="max-w-4xl mx-auto p-6 space-y-6 fade-in">
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                    
                    <header className="flex justify-between items-center mb-8">
                        <div>
                            <h2 className="text-2xl font-bold text-gray-800">Hello, {user.name} 👋</h2>
                            <p className="text-gray-500">Manage your meal plan for today</p>
                        </div>
                        <Button variant="secondary" onClick={onLogout}><i className="fas fa-sign-out-alt"></i> Logout</Button>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {/* Breakfast Card */}
                        <MealCard 
                            title="Breakfast" 
                            time="07:00 AM - 09:00 AM"
                            icon="fa-mug-hot"
                            food={menu.breakfast}
                            opted={todayAttendance.breakfast}
                            onToggle={() => handleMealToggle('breakfast')}
                        />
                        {/* Lunch Card */}
                        <MealCard 
                            title="Lunch" 
                            time="12:00 PM - 02:00 PM"
                            icon="fa-hamburger"
                            food={menu.lunch}
                            opted={todayAttendance.lunch}
                            onToggle={() => handleMealToggle('lunch')}
                        />
                        {/* Dinner Card */}
                        <MealCard 
                            title="Dinner" 
                            time="07:30 PM - 09:30 PM"
                            icon="fa-drumstick-bite"
                            food={menu.dinner}
                            opted={todayAttendance.dinner}
                            onToggle={() => handleMealToggle('dinner')}
                        />
                    </div>

                    <Card title="Feedback">
                        <textarea className="w-full border rounded-lg p-3 h-24" placeholder="Any suggestions for the menu?"></textarea>
                        <div className="mt-2 text-right">
                            <Button className="text-sm">Submit Feedback</Button>
                        </div>
                    </Card>
                </div>
            );
        };

        const MealCard = ({ title, time, icon, food, opted, onToggle }) => (
            <Card className={`card-hover relative overflow-hidden ${opted ? 'border-green-500 ring-1 ring-green-500' : ''}`}>
                <div className={`absolute top-0 right-0 w-16 h-16 rounded-bl-full ${opted ? 'bg-green-100' : 'bg-gray-100'} flex items-start justify-end p-2`}>
                    <i className={`fas ${opted ? 'fa-check-circle text-green-500' : 'fa-circle text-gray-300'} text-2xl`}></i>
                </div>
                <div className="flex items-center gap-3 mb-4">
                    <div className={`w-10 h-10 rounded-full flex items-center justify-center ${opted ? 'bg-green-500 text-white' : 'bg-blue-100 text-blue-600'}`}>
                        <i className={`fas ${icon}`}></i>
                    </div>
                    <div>
                        <h3 className="font-bold text-gray-800">{title}</h3>
                        <p className="text-xs text-gray-500">{time}</p>
                    </div>
                </div>
                <p className="text-gray-600 text-sm mb-4 min-h-[40px]">{food || "No menu set"}</p>
                <Button 
                    onClick={onToggle} 
                    variant={opted ? "secondary" : "primary"} 
                    className="w-full"
                >
                    {opted ? "Opt Out" : "Opt In"}
                </Button>
            </Card>
        );

        const MessDashboard = ({ user, onLogout }) => {
            const [menu, setMenu] = useState({});
            const [stats, setStats] = useState({});
            const [editing, setEditing] = useState(false);
            const [tempMenu, setTempMenu] = useState({});
            const [loading, setLoading] = useState(true);
            const [toast, setToast] = useState(null);
            const today = new Date().toISOString().split('T')[0];

            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                const [m, attData] = await Promise.all([API.getMenu(), API.getAttendance(today)]);
                setMenu(m);
                setTempMenu(m);
                
                // Calculate Stats
                const counts = { breakfast: 0, lunch: 0, dinner: 0, totalStudents: 0 };
                Object.values(attData).forEach(studentRec => {
                    if(studentRec.breakfast) counts.breakfast++;
                    if(studentRec.lunch) counts.lunch++;
                    if(studentRec.dinner) counts.dinner++;
                });
                // In a real app, we'd fetch total students from DB, here we mock a number
                counts.totalStudents = 50; 
                setStats(counts);
                setLoading(false);
            };

            const handleSave = async () => {
                await API.updateMenu(tempMenu);
                setMenu(tempMenu);
                setEditing(false);
                setToast({ message: "Menu updated successfully", type: "success" });
            };

            if (loading) return <div className="flex justify-center items-center h-screen"><div className="loader"></div></div>;

            return (
                <div className="max-w-6xl mx-auto p-6 space-y-6 fade-in">
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                    
                    <header className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-gray-800">Mess Manager Portal</h2>
                        <div className="flex gap-2">
                             <span className="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-sm self-center">Mess Staff</span>
                            <Button variant="secondary" onClick={onLogout}>Logout</Button>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Menu Management */}
                        <div className="lg:col-span-2 space-y-6">
                            <Card 
                                title="Today's Menu" 
                                extra={
                                    <Button variant={editing ? "success" : "primary"} onClick={() => editing ? handleSave() : setEditing(true)} className="text-sm">
                                        {editing ? "Save Changes" : "Edit Menu"}
                                    </Button>
                                }
                            >
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    {['breakfast', 'lunch', 'dinner'].map(meal => (
                                        <div key={meal}>
                                            <label className="block text-sm font-semibold text-gray-600 capitalize mb-1">{meal}</label>
                                            {editing ? (
                                                <input 
                                                    type="text" 
                                                    value={tempMenu[meal]} 
                                                    onChange={(e) => setTempMenu({...tempMenu, [meal]: e.target.value})}
                                                    className="w-full border rounded p-2 text-sm"
                                                />
                                            ) : (
                                                <div className="p-3 bg-gray-50 rounded border text-sm min-h-[60px] flex items-center">
                                                    {menu[meal]}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </Card>

                            {/* Live Stats Visualization */}
                            <Card title="Live Headcount (For Cooking)">
                                <div className="space-y-4">
                                    {['breakfast', 'lunch', 'dinner'].map(meal => {
                                        const count = stats[meal];
                                        const percentage = (count / stats.totalStudents) * 100;
                                        return (
                                            <div key={meal}>
                                                <div className="flex justify-between text-sm mb-1">
                                                    <span className="capitalize font-medium text-gray-700">{meal}</span>
                                                    <span className="text-blue-600 font-bold">{count} Students</span>
                                                </div>
                                                <div className="w-full bg-gray-200 rounded-full h-4">
                                                    <div 
                                                        className="bg-blue-600 h-4 rounded-full transition-all duration-1000 ease-out" 
                                                        style={{ width: `${percentage}%` }}
                                                    ></div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </Card>
                        </div>

                        {/* Side Info */}
                        <div className="space-y-6">
                            <Card title="Inventory Status">
                                <div className="space-y-3">
                                    <div className="flex justify-between items-center">
                                        <span className="text-gray-600">Rice</span>
                                        <span className="text-green-600 font-bold">OK</span>
                                    </div>
                                    <div className="flex justify-between items-center">
                                        <span className="text-gray-600">Vegetables</span>
                                        <span className="text-yellow-600 font-bold">Low</span>
                                    </div>
                                    <div className="flex justify-between items-center">
                                        <span className="text-gray-600">Dairy</span>
                                        <span className="text-green-600 font-bold">OK</span>
                                    </div>
                                </div>
                            </Card>
                        </div>
                    </div>
                </div>
            );
        };

        const AdminDashboard = ({ user, onLogout }) => {
            const [users, setUsers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [toast, setToast] = useState(null);

            useEffect(() => {
                loadUsers();
            }, []);

            const loadUsers = async () => {
                const data = await API.getUsers();
                setUsers(data);
                setLoading(false);
            };

            const handleExport = async () => {
                const { users, attendance } = await API.exportData();
                
                // Create CSV Content
                let csvContent = "data:text/csv;charset=utf-8,";
                csvContent += "ID,Name,Role,Email,Hostel\n";
                users.forEach(u => {
                    csvContent += `${u.id},${u.name},${u.role},${u.email},${u.hostel || 'N/A'}\n`;
                });

                // Trigger Download
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "smart_mess_report.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                setToast({ message: "Report downloaded successfully", type: "success" });
            };

            return (
                <div className="max-w-6xl mx-auto p-6 fade-in">
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

                    <header className="flex justify-between items-center mb-8">
                        <div>
                            <h2 className="text-2xl font-bold text-gray-800">System Administration</h2>
                            <p className="text-gray-500">Manage users and system settings</p>
                        </div>
                        <div className="flex gap-3">
                             <Button onClick={handleExport}><i className="fas fa-file-csv"></i> Export CSV</Button>
                             <Button variant="secondary" onClick={onLogout}>Logout</Button>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <Card className="bg-blue-50 border-blue-100">
                            <h4 className="text-blue-800 font-bold text-lg">Total Users</h4>
                            <p className="text-3xl font-bold text-blue-600 mt-2">{users.length}</p>
                        </Card>
                        <Card className="bg-purple-50 border-purple-100">
                            <h4 className="text-purple-800 font-bold text-lg">System Status</h4>
                            <p className="text-green-600 font-bold mt-2 flex items-center gap-2">
                                <span className="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span> Operational
                            </p>
                        </Card>
                        <Card className="bg-orange-50 border-orange-100">
                            <h4 className="text-orange-800 font-bold text-lg">Database Storage</h4>
                            <p className="text-orange-600 font-bold mt-2">Local (Simulated)</p>
                        </Card>
                    </div>

                    <Card title="User Management">
                        {loading ? (
                            <div className="text-center py-4"><div className="loader mx-auto"></div></div>
                        ) : (
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="text-gray-500 text-sm border-b">
                                            <th className="p-3">ID</th>
                                            <th className="p-3">Name</th>
                                            <th className="p-3">Role</th>
                                            <th className="p-3">Email</th>
                                            <th className="p-3">Details</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {users.map(u => (
                                            <tr key={u.id} className="border-b last:border-0 hover:bg-gray-50">
                                                <td className="p-3 text-gray-600">#{u.id}</td>
                                                <td className="p-3 font-medium">{u.name}</td>
                                                <td className="p-3">
                                                    <span className={`px-2 py-1 rounded text-xs font-bold 
                                                        ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 
                                                          u.role === 'mess' ? 'bg-orange-100 text-orange-700' : 
                                                          'bg-blue-100 text-blue-700'}`}>
                                                        {u.role.toUpperCase()}
                                                    </span>
                                                </td>
                                                <td className="p-3 text-gray-600">{u.email}</td>
                                                <td className="p-3 text-gray-500">{u.hostel || '-'}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </Card>
                </div>
            );
        };

        // --- Main App Container ---
        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);

            // Check if user session exists (basic persistence simulation)
            useEffect(() => {
                const stored = sessionStorage.getItem('smart_mess_user');
                if (stored) setCurrentUser(JSON.parse(stored));
            }, []);

            const handleLogin = (user) => {
                setCurrentUser(user);
                sessionStorage.setItem('smart_mess_user', JSON.stringify(user));
            };

            const handleLogout = () => {
                setCurrentUser(null);
                sessionStorage.removeItem('smart_mess_user');
            };

            // Route rendering based on Role
            const renderDashboard = () => {
                switch(currentUser.role) {
                    case 'student': return <StudentDashboard user={currentUser} onLogout={handleLogout} />;
                    case 'mess': return <MessDashboard user={currentUser} onLogout={handleLogout} />;
                    case 'admin': return <AdminDashboard user={currentUser} onLogout={handleLogout} />;
                    default: return <Login onLogin={handleLogin} />;
                }
            };

            return (
                <div className="min-h-screen text-gray-800">
                    {currentUser ? (
                        <nav className="bg-white shadow-sm border-b sticky top-0 z-40">
                            <div className="max-w-6xl mx-auto px-6 h-16 flex items-center gap-2">
                                <i className="fas fa-utensils text-blue-600 text-xl"></i>
                                <span className="font-bold text-xl tracking-tight text-blue-900">Smart Mess</span>
                            </div>
                        </nav>
                    ) : null}
                    
                    <main>
                        {currentUser ? renderDashboard() : <Login onLogin={handleLogin} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
